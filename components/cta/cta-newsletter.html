<!-- CTA - Newsletter -->
<section class="bg-indigo-600 py-16">
  <div class="mx-auto max-w-7xl px-6 lg:px-8">
    <div class="mx-auto max-w-2xl text-center">
      <h2 class="text-3xl font-bold tracking-tight text-white sm:text-4xl">
        Stay updated with our newsletter
      </h2>
      <p class="mt-4 text-lg text-indigo-100">
        Get the latest updates, tips, and exclusive content delivered straight to your inbox.
      </p>

      <form class="mt-8 flex flex-col sm:flex-row gap-4 justify-center">
        <div class="flex-1 max-w-md">
          <label for="email-address" class="sr-only">Email address</label>
          <input
            id="email-address"
            name="email"
            type="email"
            autocomplete="email"
            required
            placeholder="Enter your email"
            class="w-full rounded-lg border-0 px-5 py-4 text-gray-900 placeholder:text-gray-500 focus:ring-2 focus:ring-white shadow-lg"
          />
        </div>
        <button
          type="submit"
          class="rounded-lg bg-white px-8 py-4 font-semibold text-indigo-600 shadow-lg hover:bg-indigo-50 focus:outline-none focus:ring-2 focus:ring-white focus:ring-offset-2 focus:ring-offset-indigo-600 transition-colors"
        >
          Subscribe
        </button>
      </form>

      <p class="mt-4 text-sm text-indigo-200">
        No spam, unsubscribe anytime. Read our
        <a href="#" class="underline hover:text-white">Privacy Policy</a>.
      </p>
    </div>
  </div>
</section>

<!-- CTA - Simple Banner -->
<section class="bg-gray-900 py-16">
  <div class="mx-auto max-w-7xl px-6 lg:px-8">
    <div class="flex flex-col lg:flex-row items-center justify-between gap-8">
      <div>
        <h2 class="text-2xl font-bold tracking-tight text-white sm:text-3xl">
          Ready to get started?
        </h2>
        <p class="mt-2 text-lg text-gray-400">
          Start your free trial today. No credit card required.
        </p>
      </div>
      <div class="flex flex-col sm:flex-row gap-4">
        <a
          href="#"
          class="rounded-lg bg-indigo-600 px-8 py-3 text-center font-semibold text-white shadow-sm hover:bg-indigo-500 transition-colors"
        >
          Start free trial
        </a>
        <a
          href="#"
          class="rounded-lg border border-gray-600 px-8 py-3 text-center font-semibold text-white hover:bg-gray-800 transition-colors"
        >
          Contact sales
        </a>
      </div>
    </div>
  </div>
</section>
